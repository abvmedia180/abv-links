<title>Secure Research</title>
<style>
  html, body { margin: 0; height: 100%; font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif; }
  #gate {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #1F3A5F 0%, #152840 100%);
    display: flex; align-items: center; justify-content: center; z-index: 999;
  }
  .card {
    background: white; border-radius: 14px; padding: 40px 36px; width: 360px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35); text-align: center;
  }
  .lock { width: 44px; height: 44px; margin-bottom: 20px; }
  h2 { color: #1F3A5F; margin: 0 0 6px; font-size: 19px; font-weight: 600; }
  p.sub { color: #64748b; font-size: 13px; margin: 0 0 22px; }
  input {
    width: 100%; padding: 11px 14px; border: 2px solid #e5e7eb; border-radius: 8px;
    font-size: 15px; outline: none; box-sizing: border-box; font-family: inherit;
  }
  input:focus { border-color: #1F3A5F; }
  button {
    width: 100%; padding: 11px; background: #1F3A5F; color: white; border: none;
    border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
    margin-top: 10px; font-family: inherit; transition: background 0.15s;
  }
  button:hover { background: #152840; }
  button:disabled { background: #94a3b8; cursor: not-allowed; }
  .err { color: #dc2626; font-size: 12px; margin-top: 8px; min-height: 18px; }
</style>
</head>

      <button id="btn" type="submit">Unlock</button>
    </form>
  </div>
</div>

let fails = 0, lockUntil = 0;

async function decrypt(pw) {
  const raw = Uint8Array.from(atob(BLOB), c => c.charCodeAt(0));
  const salt = raw.slice(0, 16);
  const iv = raw.slice(16, 28);
  const ct = raw.slice(28);
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 200000, hash: "SHA-256" },
    km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
  );
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(pt);
}

async function unlock(e) {
  e.preventDefault();
  if (Date.now() < lockUntil) return false;
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  const btn = document.getElementById('btn');
  if (!pw) { err.textContent = 'Enter password'; return false; }
  btn.disabled = true; btn.textContent = 'Unlocking...'; err.textContent = '';
  try {
    const html = await decrypt(pw);
    document.open(); document.write(html); document.close();
  } catch (_) {
    fails++;
    document.getElementById('pw').value = '';
    if (fails >= 5) {
      const secs = 30 * Math.ceil(fails / 5);
      lockUntil = Date.now() + secs * 1000;
      err.textContent = 'Locked ' + secs + 's';
      setTimeout(() => { err.textContent = 'Try again'; btn.disabled = false; btn.textContent = 'Unlock'; }, secs * 1000);
    } else {
      err.textContent = 'Wrong password · ' + (5 - fails) + ' left';
      btn.disabled = false; btn.textContent = 'Unlock';
    }
  }
  return false;
}

let idle;
function resetIdle() {
  clearTimeout(idle);
  idle = setTimeout(() => location.reload(), 30 * 60 * 1000);
}
['mousemove','keydown','click','scroll','touchstart'].forEach(ev =>
  document.addEventListener(ev, resetIdle, { passive: true })
);
resetIdle();
