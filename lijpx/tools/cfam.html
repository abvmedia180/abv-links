var failedAttempts = 0;
var lockoutUntil = 0;

async function decryptData(password) {
  var raw = Uint8Array.from(atob(ENC), function(c) { return c.charCodeAt(0); });
  var salt = raw.slice(0, 16), iv = raw.slice(16, 28), ct = raw.slice(28);
  var km = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  var key = await crypto.subtle.deriveKey({name:"PBKDF2", salt:salt, iterations:200000, hash:"SHA-256"}, km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  var dec = await crypto.subtle.decrypt({name:"AES-GCM", iv:iv}, key, ct);
  return new TextDecoder().decode(dec);
}

function startLockoutTimer() {
  var errEl = document.getElementById('pwError');
  var btn = document.getElementById('unlockBtn');
  var input = document.getElementById('pwInput');
  btn.disabled = true;
  input.disabled = true;
  var tick = function() {
    var remaining = Math.ceil((lockoutUntil - Date.now()) / 1000);
    if (remaining <= 0) {
      errEl.textContent = 'You may try again';
      btn.disabled = false;
      input.disabled = false;
      btn.textContent = 'Unlock';
      input.focus();
    } else {
      errEl.textContent = 'Too many attempts. Wait ' + remaining + 's';
      btn.textContent = 'Locked';
      setTimeout(tick, 1000);
    }
  };
  tick();
}

async function handlePw(e) {
  e.preventDefault();
  if (Date.now() < lockoutUntil) return false;
  var pw = document.getElementById('pwInput').value;
  if (!pw) { document.getElementById('pwError').textContent = 'Enter a password'; return false; }
  document.getElementById('unlockBtn').textContent = 'Unlocking...';
  document.getElementById('unlockBtn').disabled = true;
  try {
    var html = await decryptData(pw);
    document.getElementById('passwordGate').remove();
    document.open();
    document.write(html);
    document.close();
  } catch(err) {
    failedAttempts++;
    document.getElementById('pwInput').value = '';
    if (failedAttempts >= 5) {
      var lockSeconds = 30 * Math.ceil(failedAttempts / 5);
      lockoutUntil = Date.now() + lockSeconds * 1000;
      startLockoutTimer();
    } else {
      document.getElementById('pwError').textContent = 'Incorrect password (' + (5 - failedAttempts) + ' attempts remaining)';
      document.getElementById('unlockBtn').textContent = 'Unlock';
      document.getElementById('unlockBtn').disabled = false;
      document.getElementById('pwInput').value = '';
    }
  }
  return false;
}

// Auto-unlock via postMessage from parent hub
window.addEventListener("message", async function(e) {
  if (e.origin !== window.location.origin) return;
  if (e.data && e.data.type === "unlock" && e.data.password) {
    try {
      var html = await decryptData(e.data.password);
      document.getElementById('passwordGate').style.display = 'none';
      document.open();
      document.write(html);
      document.close();
    } catch(err) {
      // Wrong password from hub -- keep gate visible for manual entry
    }
  }
});
function notifyParent() { if (window.parent !== window) window.parent.postMessage({type:"tool-ready"}, window.location.origin); }
notifyParent(); setTimeout(notifyParent, 200); setTimeout(notifyParent, 500); setTimeout(notifyParent, 1000);

document.getElementById('pwInput').focus();
</script>
